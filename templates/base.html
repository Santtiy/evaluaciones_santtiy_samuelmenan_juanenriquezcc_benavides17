<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Evaluaciones{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Paleta moderna y profesional */
            --primary: #5B5BFF;
            --primary-dark: #4A4AE6;
            --primary-light: #7B7BFF;
            --secondary: #FF6B6B;
            --success: #4CAF50;
            --warning: #FFC107;
            --info: #2196F3;
            --danger: #EF4444;
            
            /* Grises profesionales */
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --text-light: #9CA3AF;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FB;
            --bg-tertiary: #F0F2F7;
            --border: #E5E7EB;
            --border-light: #F3F4F6;
            
            /* Sombras sofisticadas */
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 28px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.15);
            
            /* Transiciones suaves */
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #F8F9FB 0%, #F0F2F7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
            font-weight: 400;
            line-height: 1.6;
        }

        /* HEADER / NAVBAR */
        header {
            background: var(--bg-primary);
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }

        header nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header h1 i {
            -webkit-background-clip: unset;
            -webkit-text-fill-color: unset;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.75rem;
        }

        header nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        header nav a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition-fast);
            position: relative;
            padding: 0.5rem 0;
        }

        header nav a:hover {
            color: var(--primary);
        }

        header nav a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: var(--transition-fast);
        }

        header nav a:hover::after {
            width: 100%;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            padding: 3rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* FOOTER */
        footer {
            background: var(--text-primary);
            color: #E5E7EB;
            text-align: center;
            padding: 2rem;
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer p {
            font-size: 0.875rem;
            opacity: 0.8;
            margin: 0;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header nav {
                padding: 0.75rem 1rem;
            }

            header h1 {
                font-size: 1.25rem;
            }

            header nav ul {
                gap: 1.5rem;
                font-size: 0.9rem;
            }

            main {
                padding: 1.5rem 1rem;
            }
        }

        /* UTILITY CLASSES */
        .text-center {
            text-align: center;
        }

        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mt-4 { margin-top: 2rem; }

        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }
        .mb-4 { margin-bottom: 2rem; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <nav>
            <h1><i class="fas fa-graduation-cap"></i> Evaluaciones</h1>
            <ul>
                {% if user.is_authenticated %}
                    <li><a href="/">Inicio</a></li>
                    <li><a href="{% url 'usuarios:logout' %}">Cerrar sesión</a></li>
                {% else %}
                    <li><a href="{% url 'usuarios:login' %}">Inicia sesión</a></li>
                    <li><a href="{% url 'usuarios:registro' %}">Regístrate</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sistema de Evaluaciones. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
