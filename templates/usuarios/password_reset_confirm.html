{% extends 'base.html' %}

{% block title %}Nueva contraseña{% endblock %}

{% block content %}
<div class="hero">
  <span class="eyebrow">Paso 3</span>
  <h1>Define una nueva contraseña</h1>
  <p>Completa el formulario para reemplazar la contraseña anterior y volver a entrar al sistema.</p>
</div>

<section class="panel">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary" type="submit">Cambiar contraseña</button>
  </form>
</section>
{% endblock %}
